services:
  mysql-deusto:
    image: mysql:latest
    container_name: mysql-deusto
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: MySQL1234
      MYSQL_DATABASE: CredentiFiDeusto
      MYSQL_USER: deusto
      MYSQL_PASSWORD: deusto1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_deusto:/var/lib/mysql
      - ./config/tenants/deusto/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - deusto_net

  mongo-server-deusto:
    image: mongo:latest
    container_name: mongo-server-deusto
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_deusto:/data/db
    networks:
      - deusto_net

  sql-api-deusto:
    build: ./BackEnd/SQL
    env_file:
      - ./config/tenants/deusto/sql.env
    ports:
      - "8000:8000"
    depends_on:
      - mysql-deusto
    networks:
      - deusto_net

  mongodb-api-deusto:
    build: ./BackEnd/MongoDB
    env_file:
      - ./config/tenants/deusto/mongodb.env
    ports:
      - "4000:4000"
    depends_on:
      - mongo-server-deusto
    networks:
      - deusto_net

  postgres-deusto:
    image: postgres:18
    container_name: postgres-deusto
    restart: always
    environment:
      POSTGRES_DB: waltid_deusto
      POSTGRES_USER: waltid_deusto
      POSTGRES_PASSWORD: waltid_deusto
    ports:
      - "5432:5432"
    volumes:
      - waltid_pg_deusto:/var/lib/postgresql
    networks:
      - deusto_net

  wallet-api-shared:
    image: docker.io/waltid/wallet-api:0.18.0
    env_file:
      - ./config/tenants/deusto/waltid.env
    depends_on:
      - postgres-deusto
    volumes:
      - ./waltid-identity/docker-compose/wallet-api/config:/waltid-wallet-api/config
      - ./waltid-identity/docker-compose/wallet-api/walt.yaml:/waltid-wallet-api/walt.yaml
      - waltid_wallet_shared:/waltid-wallet-api/data
    ports:
      - "7001:7001"
    networks:
      - deusto_net
      - lumiere_net

  waltid-dev-wallet-shared:
    image: docker.io/waltid/waltid-dev-wallet:0.18.0
    depends_on:
      - wallet-api-shared
    environment:
      NUXT_PUBLIC_ISSUER_CALLBACK_URL: "http://localhost:7104"
      NUXT_PUBLIC_DEMO_WALLET_URL: "http://localhost:7101"
      PORT: 7104
    expose:
      - "7104"
    networks:
      - deusto_net

  wallet-ui-proxy-shared:
    image: docker.io/caddy:2
    depends_on:
      - waltid-dev-wallet-shared
      - wallet-api-shared
    ports:
      - "7104:7104"
    volumes:
      - ./config/tenants/deusto/wallet-ui-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - deusto_net

  issuer-api-deusto:
    image: docker.io/waltid/issuer-api:0.18.0
    env_file:
      - ./config/tenants/deusto/waltid.env
    depends_on:
      - postgres-deusto
    volumes:
      - ./config/tenants/deusto/waltid/issuer-api/config:/waltid-issuer-api/config
    ports:
      - "7002:7002"
    networks:
      - deusto_net

  verifier-api-deusto:
    image: docker.io/waltid/verifier-api:0.18.0
    env_file:
      - ./config/tenants/deusto/waltid.env
    depends_on:
      - postgres-deusto
    volumes:
      - ./config/tenants/deusto/waltid/verifier-api/config:/waltid-verifier-api/config
    ports:
      - "7003:7003"
    networks:
      - deusto_net

  verifierissuer-api-deusto:
    build: ./BackEnd/VerifierIssuerAPI
    env_file:
      - ./config/tenants/deusto/verifierissuer.env
    volumes:
      - ./config/tenants/deusto/presentationDefinition:/usr/src/app/presentationDefinition
    ports:
      - "3000:3000"
    depends_on:
      - mongodb-api-deusto
      - issuer-api-deusto
      - verifier-api-deusto
    networks:
      - deusto_net

  api-gateway-deusto:
    build: ./BackEnd/Api-Gateway
    env_file:
      - ./config/tenants/deusto/api-gateway.env
    ports:
      - "5000:5000"
    depends_on:
      - sql-api-deusto
      - mongodb-api-deusto
      - verifierissuer-api-deusto
    networks:
      - deusto_net

  frontend-deusto:
    build: ./FrontEnd
    env_file:
      - ./config/tenants/deusto/frontend.env
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway-deusto
    networks:
      - deusto_net

  mysql-lumiere:
    image: mysql:latest
    container_name: mysql-lumiere
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: MySQL1234
      MYSQL_DATABASE: CredentiFiLumiere
      MYSQL_USER: lumiere
      MYSQL_PASSWORD: lumiere1234
    ports:
      - "3308:3306"
    volumes:
      - mysql_data_lumiere:/var/lib/mysql
      - ./config/tenants/lumiere/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - lumiere_net

  mongo-server-lumiere:
    image: mongo:latest
    container_name: mongo-server-lumiere
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_lumiere:/data/db
    networks:
      - lumiere_net

  sql-api-lumiere:
    build: ./BackEnd/SQL
    env_file:
      - ./config/tenants/lumiere/sql.env
    ports:
      - "8001:8000"
    depends_on:
      - mysql-lumiere
    networks:
      - lumiere_net

  mongodb-api-lumiere:
    build: ./BackEnd/MongoDB
    env_file:
      - ./config/tenants/lumiere/mongodb.env
    ports:
      - "4001:4000"
    depends_on:
      - mongo-server-lumiere
    networks:
      - lumiere_net

  postgres-lumiere:
    image: postgres:18
    container_name: postgres-lumiere
    restart: always
    environment:
      POSTGRES_DB: waltid_lumiere
      POSTGRES_USER: waltid_lumiere
      POSTGRES_PASSWORD: waltid_lumiere
    ports:
      - "5433:5432"
    volumes:
      - waltid_pg_lumiere:/var/lib/postgresql
    networks:
      - lumiere_net

  issuer-api-lumiere:
    image: docker.io/waltid/issuer-api:0.18.0
    env_file:
      - ./config/tenants/lumiere/waltid.env
    depends_on:
      - postgres-lumiere
    volumes:
      - ./config/tenants/lumiere/waltid/issuer-api/config:/waltid-issuer-api/config
    ports:
      - "7012:7012"
    networks:
      - lumiere_net

  verifier-api-lumiere:
    image: docker.io/waltid/verifier-api:0.18.0
    env_file:
      - ./config/tenants/lumiere/waltid.env
    depends_on:
      - postgres-lumiere
    volumes:
      - ./config/tenants/lumiere/waltid/verifier-api/config:/waltid-verifier-api/config
    ports:
      - "7013:7013"
    networks:
      - lumiere_net

  verifierissuer-api-lumiere:
    build: ./BackEnd/VerifierIssuerAPI
    env_file:
      - ./config/tenants/lumiere/verifierissuer.env
    volumes:
      - ./config/tenants/lumiere/presentationDefinition:/usr/src/app/presentationDefinition
    ports:
      - "3001:3000"
    depends_on:
      - mongodb-api-lumiere
      - issuer-api-lumiere
      - verifier-api-lumiere
    networks:
      - lumiere_net

  api-gateway-lumiere:
    build: ./BackEnd/Api-Gateway
    env_file:
      - ./config/tenants/lumiere/api-gateway.env
    ports:
      - "5001:5000"
    depends_on:
      - sql-api-lumiere
      - mongodb-api-lumiere
      - verifierissuer-api-lumiere
    networks:
      - lumiere_net

  frontend-lumiere:
    build: ./FrontEnd
    env_file:
      - ./config/tenants/lumiere/frontend.env
    ports:
      - "5174:5173"
    depends_on:
      - api-gateway-lumiere
    networks:
      - lumiere_net

volumes:
  mysql_data_deusto:
  mongo_data_deusto:
  waltid_pg_deusto:
  waltid_wallet_shared:
  mysql_data_lumiere:
  mongo_data_lumiere:
  waltid_pg_lumiere:

networks:
  deusto_net:
  lumiere_net:
